<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onderzoek de Functie</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Onderzoek de Functie</h1>
            <p class="subtitle">Wiskundige functie analyse met afgeleiden, extrema en buigpunten</p>
        </header>

        <main>
            <section class="input-section">
                <div class="input-group">
                    <label for="functie">f(x) =</label>
                    <input
                        type="text"
                        id="functie"
                        placeholder="x^4 - 30x^2"
                        autocomplete="off"
                    >
                    <button id="analyseer-btn" onclick="analyseer()">Analyseer</button>
                </div>

                <div class="options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-f1">
                        <span>Toon f'(x)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-f2">
                        <span>Toon f''(x)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-f3">
                        <span>Toon f'''(x)</span>
                    </label>
                </div>

                <div class="range-options">
                    <label>
                        <span>x-bereik:</span>
                        <input type="number" id="x-min" placeholder="-10" step="0.1">
                        <span>tot</span>
                        <input type="number" id="x-max" placeholder="10" step="0.1">
                    </label>
                </div>

                <div class="examples">
                    <span>Voorbeelden:</span>
                    <button onclick="setVoorbeeld('x^4 - 30x^2')">x⁴ - 30x²</button>
                    <button onclick="setVoorbeeld('x^3 - 3x')">x³ - 3x</button>
                    <button onclick="setVoorbeeld('sin(x)')">sin(x)</button>
                    <button onclick="setVoorbeeld('x^2 * exp(-x)')">x²·e⁻ˣ</button>
                </div>
            </section>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <span>Analyseren...</span>
            </div>

            <div id="error" class="error hidden"></div>

            <section id="resultaat" class="resultaat hidden">
                <div class="grafiek-container">
                    <img id="grafiek" alt="Grafiek van de functie">
                </div>

                <div class="analyse-container">
                    <div class="analyse-card">
                        <h2>Afgeleiden</h2>
                        <div id="afgeleiden"></div>
                    </div>

                    <div class="analyse-card">
                        <h2>Nulpunten</h2>
                        <div id="nulpunten"></div>
                    </div>

                    <div class="analyse-card">
                        <h2>Extrema</h2>
                        <div id="extrema"></div>
                    </div>

                    <div class="analyse-card">
                        <h2>Buigpunten</h2>
                        <div id="buigpunten"></div>
                    </div>
                </div>

                <div class="stappen-container">
                    <h2>Stap-voor-stap uitleg</h2>
                    <div id="stappen"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>Gebouwd met FastAPI, SymPy en Matplotlib</p>
        </footer>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
